    <path d="M0,0 a1,1 0 0 1 1,1 a2,2 0 0 1 -2,2 a3,3 0 0 1 -3,-3 a5,5 0 0 1 5,-5 a8,8 0 0 1 8,8"/>
  </g>
</svg>
