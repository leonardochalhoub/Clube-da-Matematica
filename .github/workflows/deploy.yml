name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissões necessárias para o deploy automático em GH Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Garante que apenas um deploy roda por vez; o mais novo cancela qualquer
# pendente que não esteja em produção ainda.
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Validate content frontmatter
        run: npm run validate-content

      - name: Build static site
        env:
          # GitHub Pages serve em /<repo-name>/
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
          # Aumenta heap pra evitar OOM com muitos MDX (i18n manifest grande).
          NODE_OPTIONS: --max-old-space-size=6144
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
